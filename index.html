<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andre — Contemporary Tattoo artist based in Bayern, Germany</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <header>
    <div class="logo-container">
      <a href="index.html" class="logo">MADE WITH PAIN</a>
      <p id="subtitle" class="subtitle">Tattoo Artist based in Bayern, Germany</p>
    </div>
    <nav>
      <a id="portfolio-btn" href="index.html" class="active">Portfolio</a>
      <a id="contacts-btn" href="contacts.html">Contacts</a>
      <button id="lang-toggle" onclick="toggleLang()">DE</button>
    </nav>
  </header>

  <main id="gallery"></main>

  <div id="modal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img id="modal-img" src="" alt="">
    <div id="modal-tags"></div>
  </div>

  <!-- Site Map / Footer Links -->
<footer class="site-map">
  <div class="site-map-container">
    <div class="footer-links">
      <a href="index.html">Portfolio</a>
      <a href="contacts.html">Contacts</a>
      <a href="datenschutz.html">Datenschutzerklärung</a>
      <a href="impressum.html">Impressum</a>
    </div>
    <div class="copyright">
      &copy; 2026 MADE WITH PAIN
    </div>
  </div>
</footer>

  <script src="script.js"></script>

  <script>
    // translation
    let currentLang = 'en';
    const texts = {
      en: {
        subtitle: "Tattoo Artist based in Bavaria, Germany",
        contacts: "Contacts",
        portfolio: "Portfolio",
        title: "Andre — Contemporary Tattoo artist based in Bayern, Germany"
      },
      de: {
        subtitle: "Tattoo Artist aus Bayern, Deutschland",
        contacts: "Kontakt",
        portfolio: "Portfolio",
        title: "Andre — Zeitgenössischer Tätowierer in Bayern, Deutschland"
      }
    };

    function setLang(lang) {
      currentLang = lang;
      
      // update elements on the page
      document.getElementById('subtitle').innerText = texts[lang].subtitle;
      document.getElementById('portfolio-btn').innerText = texts[lang].portfolio;
      document.getElementById('contacts-btn').innerText = texts[lang].contacts;
      document.title = texts[lang].title;
      document.getElementById('lang-toggle').innerText = (lang === 'en') ? 'DE' : 'EN';
    }

    function toggleLang() {
      setLang(currentLang === 'en' ? 'de' : 'en');
    }

    // initialization
    document.addEventListener('DOMContentLoaded', function() {
      setLang(currentLang);
    });
  </script>
</body>
</html>
